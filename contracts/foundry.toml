[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.26"

# Match npm-style imports used in `src/` and `test/`
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin-v5/contracts/=lib/openzeppelin-contracts/contracts/",
    "@superfluid-finance/ethereum-contracts/=lib/ethereum-contracts/packages/ethereum-contracts/",
]
optimizer = true
optimizer_runs = 200
via_ir = false

[profile.default.fuzz]
runs = 256

# Base mainnet for fork testing
[rpc_endpoints]
base = "${BASE_RPC_URL}"

[etherscan]
base = { key = "${BASESCAN_API_KEY}", chain = "base" }
